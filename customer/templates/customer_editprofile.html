{% extends 'base.html' %} {% block content %}

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card mt-5 shadow">
        <div class="card-header text-center">
          <h3>Edit Profile</h3>
        </div>

        <div class="card-body">
          <form method="POST">
            {% csrf_token %} {{ form.as_p }}

            <button type="submit" class="btn btn-success w-100">
              Update Profile
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
