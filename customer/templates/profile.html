{% extends 'base.html' %} {% block content %}

<div class="container">
  <div class="row">
    <div class="col-12 text-center text-success">
      <h1 class="fw-bold">User Details</h1>
    </div>
    {% comment %}
    <div class="col-12">
      <div class="text-end">
        <a href="{% url 'home' %}" class="btn btn-danger text-white"
          >Return to Home</a
        >
      </div>
    </div>
    {% endcomment %}
    <div
      class="col-12 d-flex justify-content-center align-items-center flex-column"
    >
      <div class="name-container">
        <p class="username">Name: {{user.username}}</p>
        <p class="email">Email: {{user.email}}</p>
        <p class="mobile">Mobile: {{ user.userprofile.mobile }}</p>
        
      </div>
    </div>
  </div>
</div>

{% endblock %}
