{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'css/admin_base.css' %}" />
  </head>
  <body>
    {% if request.user.is_authenticated %}

    <nav class="mobile-navbar">
      <div class="mobile-logo">ADMIN</div>

      <button class="menu-toggle" onclick="toggleMenu()">☰</button>

      <div class="mobile-menu text-center" id="mobileMenu">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'products' %}">Products</a>
        <a href="{% url 'add_product' %}">Add Product</a>
        <a href="{% url 'orders' %}">Orders</a>
        <a href="{% url 'admin_logout' %}">Logout</a>
      </div>
    </nav>

    <div class="sidebar">
      <h2>Multi Vendor Panel</h2>

      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'products' %}">Products</a>
      <a href="{% url 'add_product' %}">Add Product</a>
      <a href="{% url 'orders' %}">Orders</a>
      <a href="{% url 'admin_logout' %}">Logout</a>
    </div>

    <div class="main-content">{% block content %} {% endblock %}</div>

    {% else %}

    <div class="login-page">{% block login_content %} {% endblock %}</div>

    {% endif %}

    <script>
      function toggleMenu() {
        document.getElementById("mobileMenu").classList.toggle("show");
      }
      function toggleMenu() {
        document.getElementById("mobileMenu").classList.toggle("show");
      }

      document.addEventListener("click", function (event) {
        const menu = document.getElementById("mobileMenu");
        const toggleBtn = document.querySelector(".menu-toggle");

        if (!menu.contains(event.target) && !toggleBtn.contains(event.target)) {
          menu.classList.remove("show");
        }
      });
    </script>
  </body>
</html>
