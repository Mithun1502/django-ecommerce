{% extends 'admin_base.html' %} {% block login_content %}

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow admin-login-card">
    <h2 class="text-center text-white mb-4">Seller Portal</h2>

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <input
          type="text"
          name="username"
          class="form-control"
          placeholder="Username"
          required
        />
      </div>

      <div class="mb-3">
        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="Password"
          required
        />
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-info">Seller Login</button>
      </div>

      <div class="d-grid mb-3">
        <a href="{% url 'seller_register' %}" class="btn btn-success">
          Seller Registration
        </a>
      </div>

      <div class="d-grid">
        <a href="{% url 'home' %}" class="btn btn-danger">
          Customer? Login Here!
        </a>
      </div>
    </form>
  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.querySelector("form");
    const username = document.querySelector('input[name="username"]');
    const password = document.querySelector('input[name="password"]');

    function showError(input, message) {
      removeError(input);

      const error = document.createElement("div");
      error.className = "text-danger mt-1 small";
      error.innerText = message;

      input.classList.add("is-invalid");
      input.parentElement.appendChild(error);
    }

    function removeError(input) {
      input.classList.remove("is-invalid");

      const existingError = input.parentElement.querySelector(".text-danger");

      if (existingError) {
        existingError.remove();
      }
    }

    username.addEventListener("input", function () {
      removeError(username);

      if (
        username.value.trim().length > 0 &&
        username.value.trim().length < 3
      ) {
        showError(username, "Username must be at least 3 characters.");
      }
    });

    password.addEventListener("input", function () {
      removeError(password);

      if (password.value.length > 0 && password.value.length < 6) {
        showError(password, "Password must be at least 6 characters.");
      }
    });

    form.addEventListener("submit", function (e) {
      let valid = true;

      removeError(username);
      removeError(password);

      const usernameValue = username.value.trim();
      const passwordValue = password.value;

      if (usernameValue === "") {
        showError(username, "Username is required.");
        valid = false;
      } else if (usernameValue.length < 3) {
        showError(username, "Username must be at least 3 characters.");
        valid = false;
      } else if (!/^[a-zA-Z_]+$/.test(usernameValue)) {
        showError(username, "Only letters and underscore are allowed.");
        valid = false;
      }

      if (passwordValue === "") {
        showError(password, "Password is required.");
        valid = false;
      } else if (passwordValue.length < 6) {
        showError(password, "Password must be at least 6 characters.");
        valid = false;
      }

      if (!valid) {
        e.preventDefault();
      }
    });
  });
</script>
{% endblock %}
