{% extends 'admin_base.html' %} {% block login_content %}

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow admin-login-card" style="width: 400px">
    <h2 class="text-center text-white mb-4">Admin Login</h2>

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <input
          type="text"
          name="username"
          class="form-control"
          placeholder="Username"
          required
        />
      </div>

      <div class="mb-3">
        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="Password"
          required
        />
      </div>

      <div
        class="admin_login_buttons d-flex justify-content-center align-items-center gap-2 "
      >
        <button type="submit" class="btn btn-info admin_login">Login</button>
        <a href="{% url 'home' %}" class="btn btn-danger customer_login"
          >Customer? Login here!</a
        >
      </div>
    </form>
  </div>
</div>

{% endblock %}
