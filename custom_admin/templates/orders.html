{% extends 'admin_base.html' %} {% block content %}

<h2>Orders</h2>

<table class="table table-dark table-striped">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Mobile</th>
      <th>Product</th>
      <th>Qty</th>
      <th>Total</th>
    </tr>
  </thead>

  <tbody>
    {% for order in orders %}
    <tr>
      <td>{{ order.customer_name }}</td>
      <td>{{ order.customer_email }}</td>
      <td>{{ order.mobile }}</td>
      <td>{{ order.product_name }}</td>
      <td>{{ order.quantity }}</td>
      <td>₹{{ order.total }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
