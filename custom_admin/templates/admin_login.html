{% extends 'admin_base.html' %} {% block login_content %}

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow admin-login-card">
    <h2 class="text-center text-white mb-4">Seller Portal</h2>

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <div class="input-group">
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Username"
            required
          />
        </div>
      </div>

      <div class="mb-3">
        <div class="input-group">
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Password"
            required
          />

          <span
            class="input-group-text"
            onclick="togglePassword('password')"
            style="cursor: pointer"
          >
            <i class="bi bi-eye-fill"></i>
          </span>
        </div>
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-info">Seller Login</button>
      </div>

      <div class="d-grid mb-3">
        <a href="{% url 'seller_register' %}" class="btn btn-success">
          Seller Registration
        </a>
      </div>

      <div class="d-grid">
        <a href="{% url 'home' %}" class="btn btn-danger">
          Customer? Login Here!
        </a>
      </div>
    </form>
  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.querySelector("form");
    const username = document.querySelector('input[name="username"]');
    const password = document.querySelector('input[name="password"]');

    username.addEventListener("input", function () {
      removeError(username);

      if (
        username.value.trim().length > 0 &&
        username.value.trim().length < 3
      ) {
        showError(username, "Username must be at least 3 characters.");
      }
    });

    password.addEventListener("input", function () {
      removeError(password);

      if (password.value.length > 0 && password.value.length < 6) {
        showError(password, "Password must be at least 6 characters.");
      }
    });

    form.addEventListener("submit", function (e) {
      let valid = true;

      removeError(username);
      removeError(password);

      if (username.value.trim().length < 3) {
        showError(username, "Username must be at least 3 characters.");
        valid = false;
      }

      if (password.value.length < 6) {
        showError(password, "Password must be at least 6 characters.");
        valid = false;
      }

      if (!valid) {
        e.preventDefault();
      }
    });
  });
</script>
{% endblock %}
