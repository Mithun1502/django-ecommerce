{% extends 'admin_base.html' %} {% block content %}

<div class="product-view-card">
  <a href="{% url 'products' %}">
    <button class="btn btn-primary btn-sm mb-3">Return to Products</button>
  </a>

  {% if product.image %}
  <img
    src="{{ product.image.url }}"
    class="product-view-image"
    alt="{{ product.name }}"
  />
  {% endif %}

  <div class="product-view-body">
    <h2 class="product-view-title">{{ product.name }}</h2>

    <h3 class="product-view-price">₹{{ product.price }}</h3>

    <p class="product-view-description">{{ product.description }}</p>

    <a href="{% url 'products' %}" class="btn btn-secondary"> Back </a>
  </div>
</div>

{% endblock %}
